[include mainsail.cfg]
# [include toolchanger/readonly-configs/toolchanger-include.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_45001A000F50415833323520-if00
restart_method: command

[mcu EBB]
canbus_uuid: b33aeef36a93


[virtual_sdcard]
path: /home/dunga/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy#cartesian
max_velocity: 500
max_accel: 7000
square_corner_velocity: 5.0  # Set the desired value here
max_z_velocity: 75#dung25
max_z_accel: 200

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -33 #dung0
position_min: -33
position_max: 388
homing_speed: 50


[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 1.1#dung0.580
stealthchop_threshold: 999999
sense_resistor: 0.110
diag_pin: PC0   #!PA15             # X DIAG pin routed to X endstop
driver_SGTHRS: 100

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 341#dung-29
position_min: -43
position_max: 341
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 1.1#dung 0.580
stealthchop_threshold: 999999
sense_resistor: 0.110
diag_pin: PC1  #!PC0               # Y DIAG pin routed to Y endstop
driver_SGTHRS: 100

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4
endstop_pin: ^!PC2

#dung endstop_pin: probe:z_virtual_endstop  # Use the probe as the Z endstop
position_min: -11 # Allow Z to move below the bed level to account for negative offset
position_endstop: -11
position_max: 415

[probe]
pin: PC15
x_offset: -28.5   # X offset from the nozzle to the probe
y_offset: 300        # Y offset from the nozzle to the probe
z_offset: 2 # Z offset from the nozzle to the probe, fine-tune this value
speed: 8      # Speed at which the probe moves
samples: 3          # Number of samples to take for each probe
sample_retract_dist: 3.0  # Distance to retract between each sample
samples_result: average  # Use the average of the samples for the probe result
#sample_count_tolerance: 0.1  # Tolerance for sample results

[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
#step_pin: PA15
#dir_pin: !PB3
#enable_pin: !PA14
microsteps: 16
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_cross_section: 1

heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 280

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130


[heater_fan heatbreak_cooling_fan]
pin: PC7

#[heater_fan controller_fan]
[fan_generic controller_fan]
pin: PB15

[fan]
pin: PC6

[fan_generic ebb_test_fan]
pin: EBB:PA1   # example pin

[homing_override]
axes: xyz
set_position_z: 0
gcode:
  # 1. Safety Lift
  G91
  G1 Z10 F1200
  G90

  # 2. X & Y Sensorless Homing
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.9
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.9
#  G4 P2000
  G28 X
  G91 ; Back away
  G1 X5 F3000
  G90
  G4 P2000
  G28 Y
  G91 ; Back away
  G1 Y-5 F3000
  G90

  # # 3. POSITION FOR Z HOME (Off-Bed Switch)
  # M400              # Wait for all moves to finish
  # G1 X-32 Y340 F12000 
  # #G4 P1000          # Settle before Z hit
  G28 Z
  
  # 4. Final Clearance & Current Restore
  G1 Z10 F1200
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=1.1
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=1.1

  # 5. Run Verification / Calibration
  # This move stays at the sensor location to verify the "Nudge"
  VERIFY_NUDGE_CALIBRATION

[gcode_macro VERIFY_NUDGE_CALIBRATION]
gcode:
    MESSAGE_ECHO TEXT="Verifying nozzle calibration on nudge sensor..."
    
    # Ensure we are over the sensor
    G1 X-28.5 Y300 F6000
    
    # Perform the "Double Tap" probe
    PROBE SAMPLES=10 SAMPLE_RETRACT_DIST=3.0
    
    # Check if the result is within an acceptable window 
    # (e.g., if it triggers more than 0.5mm away from 0, it warns you)
    {% if printer.probe.last_z_result|abs > 0.5 %}
        MESSAGE_ECHO TEXT="WARNING: Nozzle calibration drift detected!"
    {% else %}
        MESSAGE_ECHO TEXT="Home verified. Nozzle calibrated."
    {% endif %}
    
    # Safe park
    G1 Z15 F1200